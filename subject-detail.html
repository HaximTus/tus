<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷列表 - Tus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="." class="text-2xl font-bold text-blue-600">Tus</a>
            <div class="flex gap-3">
                <a href="submit.html" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 text-sm">提交试卷</a>
                <a href="create-subject.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新建科目</a>
                <a href="upload.html" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm">管理员上传</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 科目信息 -->
        <div class="mb-8">
            <a href="." class="text-blue-600 hover:text-blue-800 text-sm">&larr; 返回所有科目</a>
            <h1 id="subjectTitle" class="text-3xl font-bold text-gray-800 mt-2">加载中...</h1>
            <p id="subjectTeacher" class="text-gray-400 mt-1"></p>
            <p id="subjectDescription" class="text-gray-500 mt-2"></p>
        </div>

        <!-- 筛选工具栏 -->
        <div class="flex flex-wrap gap-3 mb-6 items-center">
            <select id="yearFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                <option value="">全部年份</option>
            </select>
            <select id="semesterFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                <option value="">全部学期</option>
                <option value="期中">期中</option>
                <option value="期末">期末</option>
            </select>
            <input type="text" id="searchPaper" placeholder="搜索试卷标题..." class="px-3 py-2 border border-gray-300 rounded-lg text-sm flex-1 min-w-[200px]">
        </div>

        <!-- 试卷列表 -->
        <div id="papersContainer" class="space-y-3">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="text-center py-20">
            <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-gray-400">加载中...</p>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-20 hidden">
            <div class="text-6xl mb-4">📄</div>
            <p class="text-gray-500 text-lg">暂无试卷</p>
            <p class="text-gray-400 mt-2">点击「上传试卷」添加第一份吧！</p>
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="text-center py-20 hidden">
            <div class="text-6xl mb-4">😵</div>
            <p class="text-red-500 text-lg">加载失败</p>
            <p class="text-gray-400 mt-2" id="errorMessage">请检查网络连接后刷新页面</p>
            <button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">刷新重试</button>
        </div>
    </main>

    <footer class="text-center py-6 text-gray-400 text-sm">
        <p>Tus - 北京工业大学试卷共享平台</p>
    </footer>

    <script src="js/api-client.js"></script>
    <script src="js/subject-detail.js"></script>
</body>
</html>
